<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" id="pwa-icon">
<link rel="icon" type="image/png" id="favicon">
<title>Habits</title>
<script>
(function() {
  const size = 512;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.beginPath();
  ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
  ctx.clip();
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0,    '#faf8f5');
  g.addColorStop(0.28, '#faf8f5');
  g.addColorStop(0.55, '#b8b0e8');
  g.addColorStop(1,    '#4a40b0');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  const url = c.toDataURL('image/png');
  document.getElementById('pwa-icon').href = url;
  document.getElementById('favicon').href = url;
})();
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-dark: #0F6E56;
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede9;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --border: rgba(0,0,0,0.1);
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg2: #242424;
      --bg3: #2e2e2e;
      --text: #f0f0f0;
      --text2: #888;
      --border: rgba(255,255,255,0.1);
      --teal-light: #0d3d2d;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding-top: calc(var(--safe-top) + 16px);
    padding-bottom: calc(var(--safe-bottom) + 100px);
    padding-left: 16px;
    padding-right: 16px;
  }

  .header { margin-bottom: 20px; }
  .header .date { font-size: 13px; color: var(--text2); margin-bottom: 2px; }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }

  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--bg2);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
  }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
  .stat-value { font-size: 22px; font-weight: 700; }
  .stat-value span { font-size: 13px; font-weight: 400; color: var(--text2); }

  .habit-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

  .habit-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    transition: border-color .2s;
  }
  .habit-card.done { border-color: var(--teal); }

  .habit-row { display: flex; align-items: center; gap: 12px; }

  .check-btn {
    width: 30px; height: 30px; min-width: 30px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    font-size: 16px;
    color: white;
  }
  .check-btn.done { background: var(--teal); border-color: var(--teal); }

  .habit-info { flex: 1; min-width: 0; }
  .habit-name {
    font-size: 15px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: color .15s;
  }
  .habit-name.done { color: var(--text2); text-decoration: line-through; }
  .habit-streak { font-size: 11px; color: var(--teal); margin-top: 2px; }
  .habit-streak.none { color: var(--text2); }

  .dots { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .dot-col { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .dot {
    width: 13px; height: 13px; border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    box-sizing: border-box;
  }
  .dot.filled { background: var(--teal); border-color: var(--teal); }
  .dot.today-empty { border: 1.5px solid var(--teal); background: transparent; }
  .dot-label { font-size: 9px; color: var(--text2); line-height: 1; }

  .del-btn {
    color: var(--text2); background: transparent; border: none;
    cursor: pointer; padding: 6px; border-radius: 8px; opacity: .4;
    font-size: 18px; display: flex; align-items: center;
  }

  .empty-state {
    text-align: center; padding: 40px 16px;
    background: var(--bg2); border-radius: var(--radius);
    color: var(--text2); font-size: 14px; line-height: 1.6;
  }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }

  .add-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 16px calc(var(--safe-bottom) + 12px);
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex; gap: 10px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .add-bar input {
    flex: 1;
    font-size: 16px;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg2);
    color: var(--text);
    outline: none;
    font-family: inherit;
  }
  .add-bar input:focus { border-color: var(--teal); }
  .add-bar input::placeholder { color: var(--text2); }
  .add-bar button {
    padding: 11px 18px;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    flex-shrink: 0;
  }
  .add-bar button:active { opacity: .8; }
</style>
</head>
<body>

<div class="header">
  <div class="date" id="date-label"></div>
  <h1>Daily habits</h1>
</div>

<div class="summary" id="summary"></div>
<div class="habit-list" id="list"></div>

<div class="add-bar">
  <input id="inp" type="text" placeholder="Add a new habit…" maxlength="60" autocomplete="off" autocorrect="off" />
  <button onclick="addHabit()">Add</button>
</div>

<script>
let habits = [];

const STORAGE_KEY = 'habit-tracker-v1';

function getToday() {
  return new Date().toISOString().slice(0, 10);
}

function getLast7() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().slice(0, 10));
  }
  return days;
}

function getStreak(completions) {
  if (!completions || !completions.length) return 0;
  const today = getToday();
  const prev = new Date(); prev.setDate(prev.getDate() - 1);
  const yest = prev.toISOString().slice(0, 10);
  if (!completions.includes(today) && !completions.includes(yest)) return 0;
  let streak = 0;
  let cursor = new Date(completions.includes(today) ? today : yest);
  while (completions.includes(cursor.toISOString().slice(0, 10))) {
    streak++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return streak;
}

function dayInitial(dateStr) {
  return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short' })[0];
}

function formatDate(dateStr) {
  return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) habits = JSON.parse(raw);
  } catch(e) { habits = []; }
  render();
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(habits)); } catch(e) {}
}

function addHabit() {
  const inp = document.getElementById('inp');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  habits.push({ id: Date.now().toString(), name, completions: [] });
  inp.value = '';
  inp.blur();
  save(); render();
}

function toggle(id) {
  const h = habits.find(x => x.id === id);
  if (!h) return;
  const today = getToday();
  if (h.completions.includes(today)) {
    h.completions = h.completions.filter(d => d !== today);
  } else {
    h.completions.push(today);
  }
  save(); render();
}

function del(id) {
  if (!confirm('Delete this habit?')) return;
  habits = habits.filter(h => h.id !== id);
  save(); render();
}

document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') addHabit();
});

function render() {
  const today = getToday();
  const last7 = getLast7();

  document.getElementById('date-label').textContent = formatDate(today);

  const total = habits.length;
  const done = habits.filter(h => h.completions.includes(today)).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  const bestStreak = habits.reduce((m, h) => Math.max(m, getStreak(h.completions)), 0);

  const summaryEl = document.getElementById('summary');
  summaryEl.innerHTML = total ? `
    <div class="stat">
      <div class="stat-label">Today</div>
      <div class="stat-value">${done}<span>/${total}</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">Done</div>
      <div class="stat-value">${pct}<span>%</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">Streak</div>
      <div class="stat-value">${bestStreak}<span>d</span></div>
    </div>
  ` : '';

  const listEl = document.getElementById('list');

  if (!habits.length) {
    listEl.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🌱</div>
      Add your first habit below to get started
    </div>`;
    return;
  }

  listEl.innerHTML = habits.map(h => {
    const checked = h.completions.includes(today);
    const streak = getStreak(h.completions);

    const dots = last7.map(d => {
      const hit = h.completions.includes(d);
      const isToday = d === today;
      let dotClass = 'dot';
      if (hit) dotClass += ' filled';
      else if (isToday) dotClass += ' today-empty';
      return `<div class="dot-col">
        <div class="${dotClass}"></div>
        <span class="dot-label">${dayInitial(d)}</span>
      </div>`;
    }).join('');

    return `<div class="habit-card${checked ? ' done' : ''}">
      <div class="habit-row">
        <button class="check-btn${checked ? ' done' : ''}" onclick="toggle('${h.id}')" aria-label="${checked ? 'Uncheck' : 'Check'} ${h.name}">
          ${checked ? '✓' : ''}
        </button>
        <div class="habit-info">
          <div class="habit-name${checked ? ' done' : ''}">${h.name}</div>
          <div class="habit-streak${streak === 0 ? ' none' : ''}">
            ${streak > 0 ? '🔥 ' + streak + ' day streak' : 'Start your streak today'}
          </div>
        </div>
        <div class="dots">${dots}</div>
        <button class="del-btn" onclick="del('${h.id}')" aria-label="Delete ${h.name}">×</button>
      </div>
    </div>`;
  }).join('');
}

load();
</script>
</body>
</html>
